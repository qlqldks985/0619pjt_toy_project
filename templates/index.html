<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>메인 페이지</title>
</head>
<body>
    
    <h1>회원 관리 시스템</h1>

    {% if session.get('login_member') == None %}

        <a href="/signup/form">회원 가입</a>
        <br><br>

        <a href="/signin/form">로그인</a>

    {% else %}

        <p>{{ session['login_member'] }}님 환영합니다.</p>

        <a href="/logout">로그아웃</a>
        <br><br>

        <a href="/modify/form">회원 정보 수정</a>
        <br><br>

        <a href="/delete/form">회원 탈퇴</a>
        
    {% endif %}

</body>
</html>
